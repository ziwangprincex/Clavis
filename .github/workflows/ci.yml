name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri v1 system dependencies (webkit2gtk 4.0).
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      # NOTE: the frontend must be built first. `tauri::generate_context!()`
      # requires `web/dist` to exist, so `cargo check`/`cargo test` fail on a
      # clean checkout until `vite build` has produced it.
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Rust check
        run: cargo check --all-targets

      - name: Rust tests
        run: cargo test
