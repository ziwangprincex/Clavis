name: Release

# Tag-triggered multi-platform release. Push a tag like `v1.0.1` (matching the
# version in tauri.conf.json) and this builds signed installers for Windows,
# macOS, and Linux, uploads them to ONE GitHub Release, and generates the
# `latest.json` manifest the in-app updater points at.
#
# IMPORTANT: a single `create-release` job creates the (draft) release first,
# and every matrix build uploads into it via `releaseId`. Letting each matrix
# job create its own release races and produces DUPLICATE drafts with split,
# incomplete `latest.json` files — do not go back to per-job release creation.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_PRIVATE_KEY   — contents of the updater private key (tauri signer generate)
#   TAURI_KEY_PASSWORD  — the password chosen for that key
# See RELEASING.md for the full flow.

on:
  push:
    tags:
      - 'v*'

jobs:
  # Create the draft release ONCE so all three matrix builds upload into the
  # same release (and tauri-action merges every platform into one latest.json).
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v5
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Clavis ${tag}`,
              body: 'Download an installer below. Installed apps update in-app via Check for Updates.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  release:
    needs: create-release
    permissions:
      # tauri-action uploads assets to the release, which needs write access to
      # repo contents. Without this the default GITHUB_TOKEN is read-only.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: macos-latest
          # Tauri v1 needs webkit2gtk-4.0, removed in Ubuntu 24.04 — pin 22.04.
          - platform: ubuntu-22.04
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: npm --prefix web ci

      # tauri-action runs `beforeBuildCommand` (npm run build), builds the
      # bundles, signs the updater artifacts with the secrets, and uploads them
      # into the shared draft release created above. Sharing one releaseId lets
      # it merge every platform into a single latest.json.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
